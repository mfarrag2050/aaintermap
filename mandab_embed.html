<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مضيق باب المندب – الأناضول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --orange: #E05C1A;
  --navy:   #152642;
  --red:    #BC2C2C;
  --gold:   #C8900A;
  --light:  #F2EFE9;
  --border: #DDD8CE;
  --text:   #1E1E1E;
  --muted:  #666;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: 'Cairo', sans-serif;
  background: var(--navy);
}

/* ── MAP fills everything ── */
#map {
  width: 100%;
  height: 100%;
  direction: ltr;
}

.leaflet-tile-pane { filter: saturate(0.5) brightness(0.85); }
.leaflet-container { font-family: 'Cairo', sans-serif; }

/* ── TITLE OVERLAY top-right ── */
#embed-title {
  position: fixed;
  top: 10px;
  right: 10px;
  left: 10px;
  z-index: 900;
  background: rgba(21,38,66,0.94);
  border-right: 4px solid var(--orange);
  padding: 10px 14px 10px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

#embed-title .et-text h2 {
  font-family: 'Tajawal', sans-serif;
  font-size: 14px;
  font-weight: 900;
  color: white;
  line-height: 1.4;
}

#embed-title .et-text h2 em  { font-style:normal; color: var(--orange); }
#embed-title .et-text h2 strong { color: var(--red); }

#embed-title .et-text p {
  font-size: 10.5px;
  color: rgba(255,255,255,0.6);
  margin-top: 3px;
  line-height: 1.4;
}

#embed-title .et-stats {
  display: flex;
  gap: 12px;
  flex-shrink: 0;
}

.et-stat {
  text-align: center;
  border-right: 1px solid rgba(255,255,255,0.15);
  padding-right: 12px;
}
.et-stat:last-child { border-right: none; }

.et-stat .esn {
  font-family: 'Tajawal', sans-serif;
  font-size: 16px;
  font-weight: 900;
  color: #F0A030;
  line-height: 1;
}

.et-stat .esl {
  font-size: 9px;
  color: rgba(255,255,255,0.55);
  margin-top: 2px;
  line-height: 1.3;
}

/* ── LEGEND bottom-right ── */
#embed-legend {
  position: fixed;
  bottom: 30px;
  right: 10px;
  z-index: 900;
  background: rgba(255,255,255,0.96);
  border: 1px solid var(--border);
  padding: 8px 12px;
  font-family: 'Cairo', sans-serif;
  font-size: 10.5px;
  color: var(--navy);
  min-width: 160px;
  direction: rtl;
}

.leg-title {
  font-weight: 800;
  font-size: 11px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
  padding-bottom: 4px;
}

.leg-item {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 5px;
}

.leg-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.leg-line { width: 24px; height: 3px; flex-shrink: 0; }
.leg-dash { width: 24px; height: 0; border-top: 3px dashed var(--gold); flex-shrink: 0; }

/* ── SOURCE bottom-left ── */
#embed-source {
  position: fixed;
  bottom: 8px;
  left: 10px;
  z-index: 900;
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  font-family: 'Cairo', sans-serif;
  background: rgba(21,38,66,0.7);
  padding: 2px 8px;
  border-radius: 2px;
}

/* ── THREAT LABEL ── */
#threat-badge {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 900;
  background: rgba(188,44,44,0.9);
  color: white;
  font-size: 10px;
  font-weight: 700;
  padding: 4px 10px;
  font-family: 'Cairo', sans-serif;
  display: flex;
  align-items: center;
  gap: 5px;
}

/* ── Popup ── */
.leaflet-popup-content-wrapper {
  background: #152642 !important;
  color: white !important;
  border-radius: 4px !important;
  padding: 0 !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
}
.leaflet-popup-content { margin: 0 !important; min-width: 180px; }
.leaflet-popup-tip { background: #152642 !important; }
.leaflet-popup-close-button { color: rgba(255,255,255,0.6) !important; }
.popup-inner { padding: 10px 12px; direction: rtl; }
.popup-title { font-size: 12px; font-weight: 800; color: #F0A030; margin-bottom: 5px; }
.popup-row { display: flex; justify-content: space-between; font-size: 10.5px; color: rgba(255,255,255,0.85); margin-bottom: 2px; }
.popup-row span:first-child { color: rgba(255,255,255,0.5); }

/* Tooltip labels */
.lbl-mandab, .lbl-hormuz {
  background: rgba(255,255,255,0.93) !important;
  border: none !important;
  box-shadow: 0 1px 6px rgba(0,0,0,0.18) !important;
  padding: 2px 8px !important;
  border-radius: 2px !important;
  font-weight: 800 !important;
  white-space: nowrap;
}
.lbl-mandab::before, .lbl-hormuz::before { display: none !important; }
</style>
</head>
<body>

<div id="map"></div>

<!-- TITLE BAR -->
<div id="embed-title">
  <div class="et-text">
    <h2>مضيق <em>"باب المندب"</em> — <strong>رئة ثانية تتهيأ للاختناق</strong></h2>
    <p>تقرير استراتيجي · وكالة الأناضول · 29 مارس 2026</p>
  </div>
  <div class="et-stats">
    <div class="et-stat">
      <div class="esn">700 م.$</div>
      <div class="esl">تجارة سنوياً</div>
    </div>
    <div class="et-stat">
      <div class="esn">21,000</div>
      <div class="esl">سفينة / سنة</div>
    </div>
    <div class="et-stat">
      <div class="esn">10 م.⬛</div>
      <div class="esl">برميل / يوم</div>
    </div>
  </div>
</div>

<!-- THREAT BADGE -->
<div id="threat-badge">⚠ تهديد متصاعد — 28 مارس 2026</div>

<!-- LEGEND -->
<div id="embed-legend">
  <div class="leg-title">مفتاح الخريطة</div>
  <div class="leg-item"><div class="leg-dot" style="background:#E05C1A;"></div><span>باب المندب</span></div>
  <div class="leg-item"><div class="leg-dot" style="background:#BC2C2C;"></div><span>هرمز (مقيّد)</span></div>
  <div class="leg-item"><div class="leg-line" style="background:#1A5E8A;"></div><span>خط الشحن</span></div>
  <div class="leg-item"><div class="leg-dash"></div><span>طريق رأس الرجاء</span></div>
</div>

<!-- SOURCE -->
<div id="embed-source">وكالة الأناضول | © OpenStreetMap © CARTO</div>

<script>
const map = L.map('map', {
  center: [20, 50],
  zoom: 4,
  zoomControl: false,
  attributionControl: false
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  maxZoom: 18
}).addTo(map);

L.control.zoom({ position: 'bottomleft' }).addTo(map);

// ── SHIPPING ROUTE ──
L.polyline([
  [31.2, 32.3], [28.0, 33.5], [24.5, 36.5],
  [20.0, 38.8], [16.0, 41.5], [12.6, 43.4],
  [11.0, 45.0], [ 8.0, 48.0], [ 4.0, 55.0], [ 2.0, 62.0]
], { color: '#1A5E8A', weight: 3, opacity: 0.85 }).addTo(map);

// ── ALTERNATIVE ROUTE ──
L.polyline([
  [12.6, 43.4], [11.0, 45.0], [ 8.0, 48.0],
  [ 4.0, 49.5], [-2.0, 50.5], [-8.0, 50.0],
  [-15.0, 48.0], [-22.0, 45.0], [-28.0, 40.0],
  [-34.0, 30.0], [-35.5, 22.0]
], { color: '#C8900A', weight: 2.5, opacity: 0.75, dashArray: '8,6' }).addTo(map);

// ── PULSE ICON ──
function pulseIcon(color) {
  return L.divIcon({
    html: `<style>
      @keyframes p{0%{box-shadow:0 0 0 0 ${color}88}70%{box-shadow:0 0 0 14px ${color}00}100%{box-shadow:0 0 0 0 ${color}00}}
      @keyframes r{0%{transform:translate(-50%,-50%) scale(0.5);opacity:.8}100%{transform:translate(-50%,-50%) scale(1.5);opacity:0}}
    </style>
    <div style="position:relative;width:30px;height:30px;">
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:30px;height:30px;border-radius:50%;border:2px solid ${color};opacity:0;animation:r 2s ease-out infinite;"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:${color};animation:p 2s ease-out infinite;"></div>
    </div>`,
    className: '', iconSize: [30,30], iconAnchor: [15,15]
  });
}

// Bab el-Mandeb
const mandab = L.marker([12.6, 43.4], { icon: pulseIcon('#E05C1A') }).addTo(map);
mandab.bindTooltip(
  `<span style="font-family:Cairo,sans-serif;font-size:11px;font-weight:800;color:#E05C1A;">باب المندب</span>`,
  { permanent: true, direction: 'right', offset: [18, 30], className: 'lbl-mandab' }
);
mandab.bindPopup(`
  <div class="popup-inner">
    <div class="popup-title">🔴 مضيق باب المندب</div>
    <div class="popup-row"><span>العرض</span><span>~30 كم</span></div>
    <div class="popup-row"><span>النفط اليومي</span><span>7–10 م. برميل</span></div>
    <div class="popup-row"><span>السفن سنوياً</span><span>21,000+</span></div>
    <div class="popup-row"><span>التجارة سنوياً</span><span>700 مليار $</span></div>
    <div class="popup-row"><span>الحالة</span><span style="color:#F0A030">تهديد متصاعد</span></div>
  </div>`, { maxWidth: 200, direction: 'top' });

// Hormuz
const hormuz = L.marker([26.6, 56.4], { icon: pulseIcon('#BC2C2C') }).addTo(map);
hormuz.bindTooltip(
  `<span style="font-family:Cairo,sans-serif;font-size:11px;font-weight:800;color:#BC2C2C;">هرمز (مقيّد)</span>`,
  { permanent: true, direction: 'right', offset: [10, 0], className: 'lbl-hormuz' }
);
hormuz.bindPopup(`
  <div class="popup-inner">
    <div class="popup-title">🔴 مضيق هرمز</div>
    <div class="popup-row"><span>النفط اليومي</span><span>~20 م. برميل</span></div>
    <div class="popup-row"><span>الحالة</span><span style="color:#F04040">مقيّد منذ 2 مارس 2026</span></div>
  </div>`, { maxWidth: 190, direction: 'top' });

// Suez
L.circleMarker([30.5, 32.3], {
  radius: 6, fillColor: '#1A7A45', color: '#1A7A45',
  weight: 2, opacity: 1, fillOpacity: 0.85
}).addTo(map).bindTooltip('قناة السويس', { direction:'top', permanent:false });

// Yemen threat zone
L.circleMarker([15.3, 44.2], {
  radius: 26, fillColor: '#E05C1A', color: '#E05C1A',
  weight: 1, opacity: 0.2, fillOpacity: 0.07
}).addTo(map);
L.circleMarker([15.3, 44.2], {
  radius: 6, fillColor: '#E05C1A', color: '#E05C1A',
  weight: 2, opacity: 0.9, fillOpacity: 0.6
}).addTo(map).bindTooltip('منطقة التهديد الحوثي', { direction:'top' });

// Labels
function lbl(txt, color) {
  return L.divIcon({
    html:`<div style="color:${color};font-family:Cairo,sans-serif;font-size:10px;font-weight:700;white-space:nowrap;direction:rtl;text-shadow:0 1px 3px rgba(0,0,0,0.5);">${txt}</div>`,
    className:'', iconAnchor:[0,8]
  });
}
L.marker([24.7, 37.0], { icon: lbl('البحر الأحمر','rgba(255,255,255,0.8)'), interactive:false }).addTo(map);
L.marker([13.0, 50.5], { icon: lbl('خليج عدن','rgba(255,255,255,0.8)'), interactive:false }).addTo(map);
L.marker([29.3, 31.2], { icon: lbl('قناة السويس','#1A7A45'), interactive:false }).addTo(map);
L.marker([-20.0, 47.0], { icon: lbl('الطريق البديل (+6,000 ميل)','#C8900A'), interactive:false }).addTo(map);

setTimeout(()=>map.invalidateSize(), 200);
setTimeout(()=>map.invalidateSize(), 600);
setTimeout(()=>map.invalidateSize(), 1500);
</script>
</body>
</html>
