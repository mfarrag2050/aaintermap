:root{--r:#ED1C24;--d:#0d0d0e;--rv:#5aade0}
*{margin:0;padding:0;box-sizing:border-box}

body{font-family:'DM Sans',sans-serif;background:var(--d);color:#fff}
.wrap{height:100%;display:flex;flex-direction:column}

header{background:linear-gradient(135deg,#111 0%,#1a0808 100%);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--r);flex-shrink:0;flex-wrap:wrap;gap:8px}
.logo{display:flex;align-items:center;gap:10px}
.aa-mark{width:32px;height:32px;background:var(--r);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:900;font-size:12px;flex-shrink:0}

.stats{display:flex;gap:0;border-bottom:1px solid #222;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.stats::-webkit-scrollbar{display:none}
.stat{flex:1;min-width:80px;padding:10px 14px;text-align:center;border-left:1px solid #222}
.stat:last-child{border-left:none}
.stat-n{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:900}
.stat-l{font-size:10px;color:#777;margin-top:2px}

.main{flex:1;display:flex;overflow:hidden;position:relative}
.map-area{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#111113}
.map-area svg{width:100%;height:100%;max-width:1200px}

/* Panel — RTL: appears on LEFT via flex, so border-left separates it */
.panel{width:320px;background:#111;border-right:1px solid #222;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;order:2}
.map-area{order:1}
.panel-header{padding:14px 16px;border-bottom:1px solid #222;font-size:13px;color:#888;font-weight:600}
.bridge-card{padding:14px 16px;border-bottom:1px solid #1a1a1a;cursor:pointer;transition:background .25s}
.bridge-card:hover{background:rgba(237,28,36,.05)}
/* RTL active: accent on LEFT edge (visually the "inside" edge facing the map) */
.bridge-card.active{background:rgba(237,28,36,.08);border-right:3px solid var(--r)}
.bridge-card .name{font-size:13px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.bridge-card .type{font-size:10px;color:#555;margin-bottom:4px}
.bridge-card .desc{font-size:11px;color:#888;line-height:1.6}
.badge{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600}
.badge-d{background:rgba(255,23,68,.12);color:#ff4470;border:1px solid rgba(255,23,68,.25)}
.badge-p{background:rgba(255,152,0,.12);color:#ffb040;border:1px solid rgba(255,152,0,.25)}
.badge-s{background:rgba(76,175,80,.12);color:#6fcf73;border:1px solid rgba(76,175,80,.25)}
/* Detail rows — animated expand */
.detail-row{font-size:11px;color:#aaa;line-height:1.7;max-height:0;overflow:hidden;opacity:0;transition:max-height .35s ease,opacity .25s ease,margin .25s ease;margin-top:0}
.bridge-card.active .detail-row{max-height:120px;opacity:1;margin-top:6px}
.detail-row strong{color:var(--r);font-weight:600}

/* SVG animations — respect reduced motion */
@media(prefers-reduced-motion:no-preference){
  @keyframes softPulse{0%,100%{opacity:.12}50%{opacity:.04}}
  @keyframes subtleGlow{0%,100%{opacity:.7}50%{opacity:1}}
  .pulse-ring{animation:softPulse 3s ease-in-out infinite}
  .dot-glow{animation:subtleGlow 2.5s ease-in-out infinite}
}
.bridge-g{cursor:pointer;outline:none}
.bridge-g:focus-visible .dot-main{stroke:#fff;stroke-width:3}
.bridge-g .hover-ring{opacity:0;transition:opacity .3s}
.bridge-g:hover .hover-ring,.bridge-g:focus .hover-ring{opacity:.2}
.bridge-g .dot-main{transition:opacity .3s,stroke-width .2s}
.bridge-g.active-dot .dot-main{stroke-width:3}
.bridge-g.small.active-dot .dot-main{stroke-width:2.5}
/* Dim non-active dots when one is selected */
.bridge-g.dimmed .dot-main{opacity:.25}
.bridge-g.dimmed .pulse-ring,.bridge-g.dimmed .dot-glow{opacity:.03}

/* Tooltip */
#tt{position:fixed;pointer-events:none;z-index:9999;opacity:0;transition:opacity .2s,transform .2s;font-family:'DM Sans',sans-serif;transform:translateY(6px)}
#tt.show{opacity:1;transform:translateY(0)}

#tt-type{font-size:10px;color:#777;margin-top:3px}

footer{background:#111;padding:6px 16px;text-align:center;font-size:10px;color:#555;border-top:1px solid #222;flex-shrink:0}
footer span{color:var(--r);font-weight:700}

  .hide-mobile{display:none}
}

  {n:'Kinayat Bridge',s:'destroyed',t:'Secondary — Qasmiyeh area',connects:'Crosses the Litani, linking inland areas',importance:'Secondary crossing complementing the main bridge.',attack:'Struck on March 18 by Israeli airstrike.',aftermath:'Two journalists injured during coverage.'},
  {n:'Emergency Crossing (Burj Rahal)',s:'destroyed',t:'Emergency bypass',connects:'Near the South Irrigation Authority',importance:'Alternative used after other bridges were destroyed.',attack:'Struck on March 18 by airstrike.',aftermath:'Last alternative crossing severed.'},
  {n:'Zrariyeh Bridge (Tir Falsayeh)',s:'destroyed',t:'Main',connects:'Links Tyre, Bint Jbeil, Nabatieh and Zahrani',importance:'Vital coastal-inland artery. 43 m long, 12 m wide.',attack:'Struck on Friday, March 14 — first bridge hit.',aftermath:'Previously destroyed in 1996 and 2006, then rebuilt.'},
  {n:'Barghuz Bridge',s:'safe',t:'Secondary',connects:'Connects both banks of the Litani',importance:'The only crossing Israel has not struck.',attack:'No strikes as of publication.',aftermath:'Theoretically the only remaining crossing.'},
  {n:'Qaqaiyeh Bridge',s:'destroyed',t:'Main',connects:'Links Nabatieh to Bint Jbeil district',importance:'Major internal corridor in the central river section.',attack:'Fierce airstrike Monday, March 23 — complete destruction.',aftermath:'Also connects Nabatieh to Wadi al-Hujayr.'},
  {n:'Khardali Bridge',s:'partial',t:'Main',connects:'Links Nabatieh to Marjayoun district',importance:'Key link near Beaufort Castle. River bends westward here.',attack:'Not directly struck — access roads bombed.',aftermath:'Effectively out of service.'},
  {n:'Qantara Bridge (Wadi al-Hujayr)',s:'destroyed',t:'Secondary — Strategic corridor',connects:'In Wadi al-Hujayr, linking south to the interior',importance:'Sensitive corridor linking Marjayoun to Khiam.',attack:'Struck during the second week of March.',aftermath:'Isolated border towns from Marjayoun district.'}
];

var SM = {
  destroyed: {l:'Destroyed', badgeClass:'badge-d', tc:'#ff4470'},
  partial:   {l:'Roads cut', badgeClass:'badge-p', tc:'#ffb040'},
  safe:      {l:'Intact', badgeClass:'badge-s', tc:'#6fcf73'}
};

/* ══ Build Side Panel Cards (using textContent for safety) ══ */
var cardsContainer = document.getElementById('cards');
B.forEach(function(bridge, index) {
  var statusInfo = SM[bridge.s];
  var card = document.createElement('div');
  card.className = 'bridge-card';
  card.id = 'card-' + index;
  card.setAttribute('role', 'button');
  card.setAttribute('tabindex', '0');
  card.onclick = function() { sel(index); };
  card.onkeydown = function(e) { if (e.key === 'Enter') sel(index); };

  card.innerHTML =
    '<div class="name"><span></span> <span class="badge ' + statusInfo.badgeClass + '"></span></div>' +
    '<div class="type"></div>' +
    '<div class="desc"></div>' +
    '<div class="detail-row"><strong>Significance: </strong><span></span></div>' +
    '<div class="detail-row"><strong>Attack: </strong><span></span></div>' +
    (bridge.aftermath ? '<div class="detail-row"><strong>Aftermath: </strong><span></span></div>' : '');

  // Set text safely via textContent
  card.querySelector('.name span').textContent = bridge.n;
  card.querySelector('.badge').textContent = statusInfo.l;
  card.querySelector('.type').textContent = bridge.t;
  card.querySelector('.desc').textContent = bridge.connects;
  var details = card.querySelectorAll('.detail-row span');
  details[0].textContent = bridge.importance;
  details[1].textContent = bridge.attack;
  if (bridge.aftermath && details[2]) details[2].textContent = bridge.aftermath;

  cardsContainer.appendChild(card);
});

/* ══ Tooltip ══ */
var tt=document.getElementById('tt'),ttn=document.getElementById('tt-name'),tts=document.getElementById('tt-status'),ttt=document.getElementById('tt-type');
function ht(e,i){
  var b=B[i],st=SM[b.s];
  ttn.textContent=b.n;
  tts.textContent=st.l;
  tts.style.color=st.tc;
  ttt.textContent=b.t;
  tt.classList.add('show');
  mv(e);
}
function hh(){tt.classList.remove('show');}
function mv(e){
  var x=e.clientX||e.pageX,y=e.clientY||e.pageY;
  var tw=tt.offsetWidth||240,th=tt.offsetHeight||80;
  var vw=window.innerWidth,vh=window.innerHeight;
  var lx=x+15,ly=y-50;
  if(lx+tw>vw-10) lx=x-tw-15;
  if(ly<10) ly=y+15;
  if(ly+th>vh-10) ly=vh-th-10;
  tt.style.left=lx+'px';
  tt.style.top=ly+'px';
}
document.getElementById('mapsvg').addEventListener('mousemove',function(e){
  if(tt.classList.contains('show'))mv(e);
});

/* ══ Bridge Selection ══ */
var ai=-1;
function sel(i){
  document.querySelectorAll('.bridge-card').forEach(function(c){c.classList.remove('active');});
  document.querySelectorAll('.bridge-g').forEach(function(g){g.classList.remove('active-dot','dimmed');});
  if(ai===i){ai=-1;return;}
  ai=i;
  var card=document.getElementById('card-'+i);
  card.classList.add('active');
  card.scrollIntoView({behavior:'smooth',block:'nearest'});
  document.querySelectorAll('.bridge-g').forEach(function(g,j){
    if(j===i) g.classList.add('active-dot'); else g.classList.add('dimmed');
  });
}
</script>
